name: Build & Release Extension

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build and Publish Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Generate Config File
        run: |
          cat <<EOF > src/config.production.js
          module.exports = {
            GITHUB_CLIENT_ID: '${{ secrets.EXT_GITHUB_CLIENT_ID }}',
            GITHUB_CLIENT_SECRET: '${{ secrets.EXT_GITHUB_CLIENT_SECRET }}',
            GITHUB_REDIRECT_URI: '${{ secrets.EXT_GITHUB_REDIRECT_URI }}',
          };
          EOF

      - name: Build Extension
        run: npm run build
        env:
          CI: false

      - name: Zip Build Output
        run: |
          cd build
          zip -r ../GitLeet.zip *
          cd ..

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: GitLeet.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
